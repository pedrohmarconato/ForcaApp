<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <!-- viewport-fit=cover: o conteúdo alcança a área do notch/Dynamic Island
         quando instalado na tela de início do iPhone. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, viewport-fit=cover"
    />

    <title>Força</title>
    <meta name="description" content="Seu treino personalizado, ajustado a cada série." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A0A0A" />

    <!-- iOS / Safari: sem estas tags o "Adicionar à Tela de Início" abre com a
         barra do Safari por cima e com um ícone genérico (print da página).
         O iOS ignora o manifest para isto — precisa das meta apple-*. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Força" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
        /* Fundo da marca: evita o flash branco entre abrir o app e o React montar. */
        background-color: #0a0a0a;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>Você precisa habilitar o JavaScript para usar o Força.</noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
  </body>
</html>
